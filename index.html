<!DOCTYPE html>
<html>
<head>
  <title>Smart Learning Hub</title>
  <style>
    body { font-family: Arial; text-align: center; background: #f4f4f4; }
    .box { background: white; padding: 20px; margin: 20px auto; width: 380px; border-radius: 10px; }
    button { padding: 10px; margin: 5px; cursor: pointer; }
    select, input { padding: 10px; margin: 5px; width: 85%; }
  </style>
</head>

<body>

<h1>📚 Smart Learning Hub</h1>

<div class="box" id="step1">
  <h3>Enter Details</h3>
  <input type="text" id="name" placeholder="Enter Name"><br>
  <select id="class">
    <option value="">Select Class</option>
    <option>6</option>
    <option>7</option>
    <option>8</option>
    <option>9</option>
    <option>10</option>
  </select><br>
  <button onclick="next()">Next</button>
</div>

<div class="box" id="step2" style="display:none;">
  <h3>Select Subject</h3>
  <button onclick="showLessons('English')">English</button>
  <button onclick="showLessons('Science')">Science</button>
  <button onclick="showLessons('Social')">Social</button>
</div>

<div class="box" id="step3" style="display:none;">
  <h3>Select Lesson</h3>
  <div id="lessonList"></div>
</div>

<script>
let subject;

const lessons = {
  English: [
    {
      name: "Nouns",
      video: "https://www.youtube.com/watch?v=3vtXrL1Yf8g",
      pdf: "https://ncert.nic.in/textbook/pdf/feep101.pdf"
    },
    {
      name: "Verbs",
      video: "https://www.youtube.com/watch?v=3h5rFJzv9vQ",
      pdf: "https://ncert.nic.in/textbook/pdf/feep102.pdf"
    }
  ],

  Science: [
    {
      name: "Food Sources",
      video: "https://www.youtube.com/watch?v=Zgk9x2PpGmY",
      pdf: "https://ncert.nic.in/textbook/pdf/scie101.pdf"
    },
    {
      name: "Components of Food",
      video: "https://www.youtube.com/watch?v=VZ0P9Qk9lXU",
      pdf: "https://ncert.nic.in/textbook/pdf/scie102.pdf"
    }
  ],

  Social: [
    {
      name: "History Introduction",
      video: "https://www.youtube.com/watch?v=Q7yZz9Zl6gU",
      pdf: "https://ncert.nic.in/textbook/pdf/sst101.pdf"
    },
    {
      name: "Early Humans",
      video: "https://www.youtube.com/watch?v=4FJx8s3Pp9A",
      pdf: "https://ncert.nic.in/textbook/pdf/sst102.pdf"
    }
  ]
};

function next() {
  let name = document.getElementById("name").value;
  let cls = document.getElementById("class").value;

  if(name === "" || cls === "") {
    alert("Enter details");
    return;
  }

  document.getElementById("step1").style.display = "none";
  document.getElementById("step2").style.display = "block";
}

function showLessons(sub) {
  subject = sub;
  document.getElementById("step2").style.display = "none";
  document.getElementById("step3").style.display = "block";

  let list = document.getElementById("lessonList");
  list.innerHTML = "";

  lessons[sub].forEach(l => {
    list.innerHTML += `
      <p>${l.name}</p>
      <button onclick="window.open('${l.video}','_blank')">▶ Video</button>
      <button onclick="window.open('${l.pdf}','_blank')">📄 PDF</button>
      <br><br>
    `;
  });
}
</script>

</body>
</html>
