<!DOCTYPE html>
<html>
<head>
  <title>Smart Learning Hub</title>
  <style>
    body { font-family: Arial; text-align: center; background: #f4f4f4; }
    .box { background: white; padding: 20px; margin: 20px auto; width: 380px; border-radius: 10px; }
    button { padding: 10px; margin: 5px; cursor: pointer; }
    select, input { padding: 10px; margin: 5px; width: 85%; }
  </style>
</head>

<body>

<h1>📚 Smart Learning Hub</h1>

<div class="box" id="step1">
  <h3>Enter Details</h3>
  <input type="text" id="name" placeholder="Enter Name"><br>
  <select id="class">
    <option value="">Select Class</option>
    <option>6</option>
    <option>7</option>
    <option>8</option>
    <option>9</option>
    <option>10</option>
  </select><br>
  <button onclick="goNext()">Next</button>
</div>

<div class="box" id="step2" style="display:none;">
  <h3>Select Subject</h3>
  <button onclick="openSubject('English')">English</button>
  <button onclick="openSubject('Hindi')">Hindi</button>
  <button onclick="openSubject('Science')">Science</button>
  <button onclick="openSubject('Social')">Social</button>
</div>

<div class="box" id="step3" style="display:none;">
  <h3 id="title"></h3>
  <div id="content"></div>
</div>

<script>
function goNext() {
  let name = document.getElementById("name").value;
  let cls = document.getElementById("class").value;

  if(name === "" || cls === "") {
    alert("Enter all details");
    return;
  }

  document.getElementById("step1").style.display = "none";
  document.getElementById("step2").style.display = "block";
}

function openSubject(subject) {
  document.getElementById("step2").style.display = "none";
  document.getElementById("step3").style.display = "block";

  document.getElementById("title").innerText = subject + " Learning";

  let pdfLinks = {
    English: "https://ncert.nic.in/textbook/pdf/feep1dd.pdf",
    Hindi: "https://ncert.nic.in/textbook/pdf/hinl1dd.pdf",
    Science: "https://ncert.nic.in/textbook/pdf/scie1dd.pdf",
    Social: "https://ncert.nic.in/textbook/pdf/sstl1dd.pdf"
  };

  let contentDiv = document.getElementById("content");

  contentDiv.innerHTML = `
    <h4>📄 NCERT Full Book</h4>
    <button onclick="window.open('${pdfLinks[subject]}','_blank')">
      Open Book
    </button>

    <h4>🎥 Search Any Lesson Video</h4>
    <input type="text" id="chapter" placeholder="Enter Chapter Name">
    <br>
    <button onclick="searchVideo('${subject}')">
      Search Video
    </button>
  `;
}

function searchVideo(subject) {
  let chapter = document.getElementById("chapter").value;

  if(chapter === "") {
    alert("Enter chapter name");
    return;
  }

  let query = subject + " class " + chapter + " lesson";
  let url = "https://www.youtube.com/results?search_query=" + encodeURIComponent(query);

  window.open(url, "_blank");
}
</script>

</body>
</html>
