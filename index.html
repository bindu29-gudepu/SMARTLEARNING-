<!DOCTYPE html>
<html>
<head>
  <title>Smart Learning Hub</title>
  <style>
    body { font-family: Arial; text-align: center; background: #f4f4f4; }
    .box { background: white; padding: 20px; margin: 20px auto; width: 360px; border-radius: 10px; }
    button { padding: 10px; margin: 5px; }
    select, input { padding: 10px; margin: 5px; width: 85%; }
    iframe { width: 100%; height: 250px; margin-top: 10px; }
    .pdf-frame { height: 350px; }
  </style>
</head>

<body>

<h1>📚 Smart Learning Hub</h1>

<div class="box" id="step1">
  <h3>Enter Details</h3>
  <input type="text" id="name" placeholder="Enter Name"><br>
  <select id="class">
    <option value="">Select Class</option>
    <option>6</option>
    <option>7</option>
    <option>8</option>
    <option>9</option>
    <option>10</option>
  </select><br>
  <button onclick="goToSubjects()">Next</button>
</div>

<div class="box" id="step2" style="display:none;">
  <h3>Select Subject</h3>
  <button onclick="selectSubject('English')">English</button>
  <button onclick="selectSubject('Hindi')">Hindi</button>
  <button onclick="selectSubject('Science')">Science</button>
  <button onclick="selectSubject('Social')">Social</button>
</div>

<div class="box" id="step3" style="display:none;">
  <h3>Select Learning Style</h3>
  <button onclick="showContent('video')">🎥 Video</button>
  <button onclick="showContent('pdf')">📄 PDF Material</button>
</div>

<div class="box" id="step4" style="display:none;">
  <h3 id="title"></h3>
  <div id="content"></div>
</div>

<script>
let subject;

const lessons = {

English: {
  video: [
    { title: "English Grammar", embed: "https://www.youtube.com/embed/6L7Hc8f9bXU" }
  ],
  pdf: [
    { title: "Class 6 English NCERT", link: "https://ncert.nic.in/textbook/pdf/feep1dd.pdf" }
  ]
},

Hindi: {
  video: [
    { title: "Hindi Grammar", embed: "https://www.youtube.com/embed/QkK0hT8y8i4" }
  ],
  pdf: [
    { title: "Class 6 Hindi NCERT", link: "https://ncert.nic.in/textbook/pdf/hinl1dd.pdf" }
  ]
},

Science: {
  video: [
    { title: "Science Lesson", embed: "https://www.youtube.com/embed/Og5xAdC8EUI" }
  ],
  pdf: [
    { title: "Class 6 Science NCERT", link: "https://ncert.nic.in/textbook/pdf/scie1dd.pdf" }
  ]
},

Social: {
  video: [
    { title: "Social Studies", embed: "https://www.youtube.com/embed/9p4kX3b1l7Q" }
  ],
  pdf: [
    { title: "Class 6 Social Science NCERT", link: "https://ncert.nic.in/textbook/pdf/sstl1dd.pdf" }
  ]
}

};

function goToSubjects() {
  const name = document.getElementById("name").value;
  const cls = document.getElementById("class").value;

  if(name === "" || cls === "") {
    alert("Please enter all details");
    return;
  }

  document.getElementById("step1").style.display = "none";
  document.getElementById("step2").style.display = "block";
}

function selectSubject(sub) {
  subject = sub;
  document.getElementById("step2").style.display = "none";
  document.getElementById("step3").style.display = "block";
}

function showContent(type) {
  document.getElementById("step3").style.display = "none";
  document.getElementById("step4").style.display = "block";

  let data = lessons[subject];
  let contentDiv = document.getElementById("content");
  contentDiv.innerHTML = "";

  document.getElementById("title").innerText = subject + " - " + type.toUpperCase();

  if(type === "video") {
    data.video.forEach(v => {
      contentDiv.innerHTML += `
        <p>${v.title}</p>
        <iframe src="${v.embed}" allowfullscreen></iframe>
      `;
    });
  } else {
    data.pdf.forEach(p => {
      contentDiv.innerHTML += `
        <p>${p.title}</p>
        <iframe class="pdf-frame" src="${p.link}"></iframe>
        <br><a href="${p.link}" target="_blank">⬇ Download PDF</a><br><br>
      `;
    });
  }
}
</script>

</body>
</html>
